name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  ci:
    name: Install · Typecheck · Lint · Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # dist/ is intentionally NOT cached between runs. The `cache: pnpm` option on
    # `actions/setup-node` caches only the pnpm store. Caching dist/ would risk restoring a stale
    # dist/.tsbuildinfo whose fingerprints disagree with live source, causing `tsc -b`
    # to skip re-checking changed files and silently pass a broken typecheck.
    # Any future cache step that covers dist/ must key on hashFiles('**/tsconfig*.json','pnpm-lock.yaml').
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1  # v4
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
