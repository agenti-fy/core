name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

jobs:
  ci:
    name: Install · Typecheck · Lint · Test
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # dist/ is intentionally NOT cached between runs. The `cache: pnpm` option on
    # `actions/setup-node` caches only the pnpm store. Caching dist/ would risk restoring a stale
    # dist/.tsbuildinfo whose fingerprints disagree with live source, causing `tsc -b`
    # to skip re-checking changed files and silently pass a broken typecheck.
    # Any future cache step that covers dist/ must key on hashFiles('**/tsconfig*.json','pnpm-lock.yaml').
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093  # v6.0.8
        with:
          version: 10.20.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test
